version: "3.9"

services:

  # ── Django app ────────────────────────────────────────────────
  web:
    build: .
    container_name: onlinecourse_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/static
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret-key-change-in-production
      - DJANGO_ALLOWED_HOSTS=localhost 127.0.0.1
      - DATABASE_URL=sqlite:///db.sqlite3
    depends_on:
      - db
    restart: on-failure

  # ── PostgreSQL (production-ready swap for SQLite) ─────────────
  db:
    image: postgres:15-alpine
    container_name: onlinecourse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=onlinecourse
      - POSTGRES_USER=django
      - POSTGRES_PASSWORD=django_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django -d onlinecourse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer — lightweight DB GUI ──────────────────────────────
  adminer:
    image: adminer:latest
    container_name: onlinecourse_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: on-failure

volumes:
  postgres_data:
  media_data:
  static_data: